version: '3.8'

services:

  db:
    image: postgres:15-alpine
    container_name: cicd-db
    environment:
      - POSTGRES_DB=itemsdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cicd-backend
    environment:
      - DB_HOST=localhost
      - DB_PORT=5432
      - DB_NAME=itemsdb
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    network_mode: host
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cicd-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    network_mode: host
    depends_on:
      - backend

volumes:
  postgres_data:
```

